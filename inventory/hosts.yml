---
# Ansible inventory for Proxmox RHEL VM provisioning
#
# [proxmox] — Proxmox VE host(s) for API interactions.
#              Connection details are in group_vars/proxmox.yml.
#
# [newvms]  — Populated dynamically at runtime via add_host in provision.yml.
#              Connection defaults are in group_vars/newvms.yml.
#              Do NOT add hosts here manually.

all:
  children:
    proxmox:
      hosts:
        pve01.example.com:
          # Override ansible_host if the hostname doesn't resolve:
          # ansible_host: 192.168.1.1

    newvms:
      # Dynamically populated — leave empty
      hosts: {}
